services:
  - type: worker
    name: live-forex-signals-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NEWS_PROVIDER
        value: "auto"
      - key: NEWSDATA_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FETCH_INTERVAL_SECONDS
        value: "900"
      - key: MAX_ARTICLES_PER_CYCLE
        value: "5"
      - key: NEWS_QUERY
        value: 'forex OR "foreign exchange" OR (dollar AND fed) OR (euro AND ecb) OR (pound AND boe) OR (yen AND boj) OR (gold AND fed)'
